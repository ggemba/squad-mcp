name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: verify version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          MARKET_VERSION=$(node -p "require('./.claude-plugin/marketplace.json').plugins[0].version")
          SERVER_VERSION=$(node -p "require('fs').readFileSync('src/index.ts','utf8').match(/SERVER_VERSION = \"([^\"]+)\"/)[1]")
          MCP_NPX_PIN=$(node -p "(require('./.claude-plugin/plugin.json').mcpServers.squad.args || []).join(' ').match(/@gempack\/squad-mcp@([0-9]+\.[0-9]+\.[0-9]+)/)?.[1] || ''")
          fail=0
          for pair in "package.json:$PKG_VERSION" ".claude-plugin/plugin.json:$PLUGIN_VERSION" ".claude-plugin/marketplace.json:$MARKET_VERSION" "src/index.ts SERVER_VERSION:$SERVER_VERSION" ".claude-plugin/plugin.json mcpServers.squad npx pin:$MCP_NPX_PIN"; do
            file="${pair%:*}"
            ver="${pair##*:}"
            if [ "$ver" != "$TAG_VERSION" ]; then
              echo "::error::$file version ($ver) does not match tag ($TAG_VERSION)"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            exit 1
          fi
          echo "all version pins match tag $TAG_VERSION"
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  smoke:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: wait for tarball to propagate
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          for i in 1 2 3 4 5 6; do
            if npm view "@gempack/squad-mcp@${TAG_VERSION}" version >/dev/null 2>&1; then
              echo "version ${TAG_VERSION} is live on registry"
              exit 0
            fi
            echo "attempt $i: version not yet visible; sleeping 10s"
            sleep 10
          done
          echo "::error::tarball not visible on registry after 60s"
          exit 1
      - name: warm the npx cache (avoids first-run fetch counting against the smoke timeout)
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Force the fetch + extract so the smoke step below only pays for
          # spawn + handshake. Without this the cold fetch (~10-25s on a GH
          # runner) eats the handshake budget and the smoke flakes. Drop the
          # `|| true` so the warm step now fails loudly if the bin won't run
          # — earlier releases masked the same npx-bin-resolution failure that
          # broke the smoke (sh: squad-mcp: not found) under the silent `|| true`.
          npx -y --package="@gempack/squad-mcp@${TAG_VERSION}" squad-mcp --help >/dev/null 2>&1
      - name: smoke the published tarball over stdio
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # The smoke script talks JSON-RPC over stdio to a freshly fetched
          # copy. CRITICAL: invoke npx via the `--package=<scoped>` + explicit
          # bin form, not `npx -y @scope/pkg`. The short form has been
          # unreliable in npm 10+ for scoped packages — `sh: squad-mcp: not
          # found` happens because npx fails to wire the bin onto PATH and
          # falls back to running the unscoped name as a shell command. The
          # long form gives npm an explicit (package, bin) tuple to resolve.
          cat > /tmp/smoke-published.mjs <<EOF
          import { spawn } from "node:child_process";
          const child = spawn(
            "npx",
            ["-y", "--package=@gempack/squad-mcp@${TAG_VERSION}", "squad-mcp"],
            { stdio: ["pipe", "pipe", "inherit"] },
          );
          let buf = "";
          const messages = [];
          child.stdout.on("data", (c) => {
            buf += c.toString("utf8");
            let idx;
            while ((idx = buf.indexOf("\n")) !== -1) {
              const line = buf.slice(0, idx).trim();
              buf = buf.slice(idx + 1);
              if (line) { try { messages.push(JSON.parse(line)); } catch {} }
            }
          });
          const send = (req) => child.stdin.write(JSON.stringify(req) + "\n");
          // 90s budget — even with the warm cache, npx adds spawn latency on
          // top of the server's own startup. Better to fail loudly after 90s
          // than to flake at 30s.
          const waitFor = (id, timeoutMs = 90_000) => new Promise((resolve, reject) => {
            const start = Date.now();
            const t = setInterval(() => {
              const m = messages.find((x) => x.id === id);
              if (m) { clearInterval(t); resolve(m); }
              else if (Date.now() - start > timeoutMs) { clearInterval(t); reject(new Error("timeout " + id)); }
            }, 50);
          });
          try {
            send({ jsonrpc: "2.0", id: 1, method: "initialize", params: { protocolVersion: "2024-11-05", capabilities: {}, clientInfo: { name: "release-smoke", version: "0.0" } } });
            await waitFor(1);
            send({ jsonrpc: "2.0", id: 2, method: "tools/list" });
            const r = await waitFor(2);
            const names = r.result.tools.map((t) => t.name);
            if (!names.includes("compose_advisory_bundle")) throw new Error("missing compose_advisory_bundle in published tarball");
            console.log("PUBLISHED SMOKE OK: " + names.length + " tools");
            process.exit(0);
          } catch (err) {
            console.error("PUBLISHED SMOKE FAILED:", err.message);
            process.exit(1);
          } finally {
            child.kill();
          }
          EOF
          node /tmp/smoke-published.mjs
