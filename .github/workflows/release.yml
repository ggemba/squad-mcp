name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: verify version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./.claude-plugin/plugin.json').version")
          MARKET_VERSION=$(node -p "require('./.claude-plugin/marketplace.json').plugins[0].version")
          SERVER_VERSION=$(node -p "require('fs').readFileSync('src/index.ts','utf8').match(/SERVER_VERSION = \"([^\"]+)\"/)[1]")
          fail=0
          for pair in "package.json:$PKG_VERSION" ".claude-plugin/plugin.json:$PLUGIN_VERSION" ".claude-plugin/marketplace.json:$MARKET_VERSION" "src/index.ts SERVER_VERSION:$SERVER_VERSION"; do
            file="${pair%:*}"
            ver="${pair##*:}"
            if [ "$ver" != "$TAG_VERSION" ]; then
              echo "::error::$file version ($ver) does not match tag ($TAG_VERSION)"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            exit 1
          fi
          echo "all version pins match tag $TAG_VERSION"
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  smoke:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: wait for tarball to propagate
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          for i in 1 2 3 4 5 6; do
            if npm view "@gempack/squad-mcp@${TAG_VERSION}" version >/dev/null 2>&1; then
              echo "version ${TAG_VERSION} is live on registry"
              exit 0
            fi
            echo "attempt $i: version not yet visible; sleeping 10s"
            sleep 10
          done
          echo "::error::tarball not visible on registry after 60s"
          exit 1
      - name: install the published tarball into a fresh temp dir
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Install into a dedicated workspace, then verify dist/index.js
          # exists and is executable. We invoke `node <abs path>` directly
          # in the smoke step below — sidesteps the npx-bin-resolution path
          # that has been broken for scoped packages on Ubuntu CI since
          # the smoke job was introduced (v0.7.0). Repeatedly seeing
          # `sh: squad-mcp: not found` was npx failing to wire the bin
          # symlink onto PATH; running `node <path>` is immune.
          mkdir -p /tmp/squad-smoke && cd /tmp/squad-smoke
          npm init -y >/dev/null
          npm install --no-save "@gempack/squad-mcp@${TAG_VERSION}"
          ls -la node_modules/@gempack/squad-mcp/dist/index.js
          test -x node_modules/@gempack/squad-mcp/dist/index.js \
            || (echo "::error::dist/index.js is not executable in the published tarball"; exit 1)
      - name: smoke the published tarball over stdio
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          cd /tmp/squad-smoke
          # Invoke `node` on the absolute path of the installed entry point.
          # No PATH lookup, no npx, no shell-resolved bin name — this is the
          # most direct way to prove the published tarball boots and speaks
          # JSON-RPC over stdio.
          cat > /tmp/smoke-published.mjs <<EOF
          import { spawn } from "node:child_process";
          import path from "node:path";
          const entry = path.resolve(
            "/tmp/squad-smoke/node_modules/@gempack/squad-mcp/dist/index.js",
          );
          const child = spawn("node", [entry], {
            stdio: ["pipe", "pipe", "inherit"],
          });
          let buf = "";
          const messages = [];
          child.stdout.on("data", (c) => {
            buf += c.toString("utf8");
            let idx;
            while ((idx = buf.indexOf("\n")) !== -1) {
              const line = buf.slice(0, idx).trim();
              buf = buf.slice(idx + 1);
              if (line) { try { messages.push(JSON.parse(line)); } catch {} }
            }
          });
          const send = (req) => child.stdin.write(JSON.stringify(req) + "\n");
          // 30s budget — invoking `node` directly on the installed entry
          // skips the npx fetch+extract+spawn ladder, so the only cost
          // here is the server's own startup (~1-2s for tools/list to
          // resolve). 30s is plenty; flake budget kept generous.
          const waitFor = (id, timeoutMs = 30_000) => new Promise((resolve, reject) => {
            const start = Date.now();
            const t = setInterval(() => {
              const m = messages.find((x) => x.id === id);
              if (m) { clearInterval(t); resolve(m); }
              else if (Date.now() - start > timeoutMs) { clearInterval(t); reject(new Error("timeout " + id)); }
            }, 50);
          });
          try {
            send({ jsonrpc: "2.0", id: 1, method: "initialize", params: { protocolVersion: "2024-11-05", capabilities: {}, clientInfo: { name: "release-smoke", version: "0.0" } } });
            await waitFor(1);
            send({ jsonrpc: "2.0", id: 2, method: "tools/list" });
            const r = await waitFor(2);
            const names = r.result.tools.map((t) => t.name);
            if (!names.includes("compose_advisory_bundle")) throw new Error("missing compose_advisory_bundle in published tarball");
            console.log("PUBLISHED SMOKE OK: " + names.length + " tools");
            process.exit(0);
          } catch (err) {
            console.error("PUBLISHED SMOKE FAILED:", err.message);
            process.exit(1);
          } finally {
            child.kill();
          }
          EOF
          node /tmp/smoke-published.mjs
